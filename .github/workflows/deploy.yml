name: Secure Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🔐 Inject Secrets into db.php
      run: |
        sed -i "s/DB_HOST_PLACEHOLDER/${{ secrets.DB_HOST }}/g" adding/db.php
        sed -i "s/DB_NAME_PLACEHOLDER/${{ secrets.DB_NAME }}/g" adding/db.php
        sed -i "s/DB_USER_PLACEHOLDER/${{ secrets.DB_USER }}/g" adding/db.php
        sed -i "s/DB_PASS_PLACEHOLDER/${{ secrets.DB_PASS }}/g" adding/db.php

    - name: 🚀 FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./htdocs/